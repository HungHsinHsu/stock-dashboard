name: stock-predict

on:
  schedule:
    - cron: "40 23 * * 0-4"  # 台灣 07:40 開盤預測（主；避 :30/:00 尖峰、離 9:00 開盤留 80 分緩衝）
    - cron: "10 0 * * 1-5"   # 台灣 08:10 開盤預測（備援；主班次被 GitHub 丟棄時補上，write-once 不會重複）
    - cron: "20 7 * * 1-5"   # 台灣 15:20 收盤復盤（當日資料若已發布即結算；避開半點尖峰）
    - cron: "35 7 * * 1-5"   # 台灣 15:35 收盤後選股掃描（資料到齊後推薦清單）
    - cron: "0 10 * * 1-5"   # 台灣 18:00 收盤復盤補跑（15:20 資料未到時）
  workflow_dispatch:
    inputs:
      job:
        description: "morning or evening"
        required: true
        default: "morning"
      admin_date:
        description: "dbadmin 用：要檢視/清除的日期 YYYY-MM-DD（非交易日髒資料）"
        required: false
        default: ""
      admin_action:
        description: "dbadmin 用：list（預設，只檢視）或 delete（確認後刪除）"
        required: false
        default: "list"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Claude Agent SDK 透過 Claude Code CLI 執行，先裝好 CLI
      - run: npm install -g @anthropic-ai/claude-code
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Decide job
        id: which
        env:
          # ⚠️ 必須涵蓋上方 schedule 中所有「開盤預測」的 cron；改排程時要一起改
          SCHED: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            JOB="${{ github.event.inputs.job }}"
          elif [ "$SCHED" = "40 23 * * 0-4" ] || [ "$SCHED" = "10 0 * * 1-5" ]; then
            JOB="morning"     # 主 07:40／備援 08:10 都是開盤預測
          elif [ "$SCHED" = "35 7 * * 1-5" ]; then
            JOB="screen"      # 15:35 收盤後選股掃描
          else
            JOB="evening"
          fi
          echo "job=$JOB" >> "$GITHUB_OUTPUT"
          echo "診斷：event=${{ github.event_name }} schedule='$SCHED' → job=$JOB"
      - name: Run job
        env:
          # 用 Max 訂閱的 OAuth token（claude setup-token 產生），不用 API 金鑰
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # jobs.dbadmin 專用（其他 job 忽略）：清非交易日髒資料
          ADMIN_DATE: ${{ github.event.inputs.admin_date }}
          ADMIN_ACTION: ${{ github.event.inputs.admin_action }}
        run: python -m jobs.${{ steps.which.outputs.job }}
      - name: Commit history（僅 JSON 模式；設了 DATABASE_URL 就走 DB、跳過）
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "DB 模式：資料已寫入 Postgres，跳過 JSON commit。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f history/predictions.json ]; then
            echo "No history file produced (job may have skipped); nothing to commit."
            exit 0
          fi
          git add history/predictions.json
          [ -f lessons.json ] && git add lessons.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Chore: 更新預測/復盤紀錄 [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
