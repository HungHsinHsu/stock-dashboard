name: stock-predict

on:
  schedule:
    - cron: "30 0 * * 1-5"   # 台灣 08:30 開盤預測
    - cron: "30 7 * * 1-5"   # 台灣 15:30 收盤復盤（當日資料若已發布即結算）
    - cron: "0 10 * * 1-5"   # 台灣 18:00 收盤復盤補跑（15:30 資料未到時）
  workflow_dispatch:
    inputs:
      job:
        description: "morning or evening"
        required: true
        default: "morning"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Claude Agent SDK 透過 Claude Code CLI 執行，先裝好 CLI
      - run: npm install -g @anthropic-ai/claude-code
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Decide job
        id: which
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "job=${{ github.event.inputs.job }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 0 * * 1-5" ]; then
            echo "job=morning" >> "$GITHUB_OUTPUT"
          else
            echo "job=evening" >> "$GITHUB_OUTPUT"
          fi
      - name: Run job
        env:
          # 用 Max 訂閱的 OAuth token（claude setup-token 產生），不用 API 金鑰
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m jobs.${{ steps.which.outputs.job }}
      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f history/predictions.json ]; then
            echo "No history file produced (job may have skipped); nothing to commit."
            exit 0
          fi
          git add history/predictions.json
          [ -f lessons.json ] && git add lessons.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Chore: 更新預測/復盤紀錄 [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
