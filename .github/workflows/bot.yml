name: stock-bot

on:
  schedule:
    - cron: "*/15 * * * *"  # 接力重啟：排隊的 run 會在前一個結束時立刻接上
  workflow_dispatch:

permissions:
  contents: write

# 只允許一個在跑；新觸發排隊，前一個結束就立刻接上 → 近乎不間斷
concurrency:
  group: stock-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # < 6h，留餘裕讓迴圈自行收尾
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas python-dateutil
      - name: Long-poll Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m jobs.bot --loop
