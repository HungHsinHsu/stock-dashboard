name: stock-bot

on:
  schedule:
    - cron: "*/10 * * * *"   # 每 10 分鐘檢查一次 Telegram 指令
  workflow_dispatch:

permissions:
  contents: write

# 同時只跑一個，避免兩次輪詢互相覆蓋
concurrency:
  group: stock-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas python-dateutil
      - name: Poll Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m jobs.bot
      - name: Commit watchlist / state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in watchlist.json bot_state.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Chore: 更新股票清單/輪詢狀態 [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
